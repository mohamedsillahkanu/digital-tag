<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Card - SBD 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --blue: #0a2463; --blue-mid: #1e3a8a; --blue-accent: #3b82f6;
            --green: #059669;
            --red: #dc2626; --red-bg: #fef2f2;
            --bg: #f1f5f9; --card: #ffffff;
            --text: #0f172a; --text-mid: #475569; --text-light: #94a3b8; --border: #e2e8f0;
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        /* ── SCAN SCREEN ── */
        .scan-screen {
            min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
            background: var(--blue);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(5,150,105,0.1) 0%, transparent 50%);
        }
        .scan-card {
            background:var(--card); border-radius:22px; padding:36px 28px;
            width:100%; max-width:380px; box-shadow:var(--shadow-lg);
        }
        .scan-brand { text-align:center; margin-bottom:28px; }
        .brand-icon {
            width:68px; height:68px;
            background:linear-gradient(135deg,var(--blue),var(--blue-mid));
            border-radius:18px; display:inline-flex; align-items:center; justify-content:center;
            margin-bottom:14px; box-shadow:0 8px 24px rgba(10,36,99,0.3);
        }
        .brand-icon svg { width:34px; height:34px; stroke:#fff; fill:none; }
        .scan-brand h1 { font-family:'Oswald',sans-serif; font-size:26px; font-weight:700; color:var(--blue); letter-spacing:2px; line-height:1; }
        .scan-brand p  { font-size:12px; color:var(--text-light); margin-top:6px; font-weight:500; }

        .err-box {
            display:none; background:var(--red-bg); border:1px solid #fecaca;
            color:var(--red); padding:12px 14px; border-radius:12px;
            font-size:13px; margin-bottom:16px; text-align:center; font-weight:600; line-height:1.5;
        }
        .err-box.show { display:block; animation:shake .35s; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

        .scan-hint { font-size:13px; color:var(--text-mid); font-weight:500; text-align:center; margin-bottom:18px; line-height:1.5; }

        .reader-wrap { background:#000; border-radius:14px; overflow:hidden; margin-bottom:14px; display:none; }
        #reader-login { width:100%; }
        #reader-login img { display:none !important; }
        #reader-login { border:none !important; }

        .scan-btn {
            width:100%; padding:15px; border:none; border-radius:12px;
            font-family:'Oswald',sans-serif; font-size:16px; font-weight:600; letter-spacing:2px;
            cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:10px;
        }
        .scan-btn svg { width:20px; height:20px; stroke:currentColor; fill:none; }
        .btn-start { background:linear-gradient(135deg,var(--blue),var(--blue-mid)); color:#fff; }
        .btn-start:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(10,36,99,0.3); }
        .btn-stop  { background:var(--red); color:#fff; margin-top:10px; }
        .btn-stop:hover  { background:#b91c1c; }

        /* ── APP SCREEN ── */
        .app-screen { display:none; min-height:100vh; }
        .app-screen.show { display:block; }

        .app-header {
            background:linear-gradient(135deg,var(--blue),var(--blue-mid));
            color:#fff; padding:14px 20px; position:sticky; top:0; z-index:100;
            box-shadow:0 4px 16px rgba(0,0,0,0.15);
        }
        .hdr-row { max-width:500px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
        .hdr-left { display:flex; align-items:center; gap:10px; }
        .hdr-icon { width:34px; height:34px; background:rgba(255,255,255,0.12); border-radius:10px; display:flex; align-items:center; justify-content:center; }
        .hdr-icon svg { width:18px; height:18px; stroke:#fff; fill:none; }
        .hdr-title { font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; letter-spacing:1.5px; }
        .hdr-sub   { font-size:10px; opacity:.6; font-weight:500; }
        .rescan-btn {
            background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
            color:#fff; padding:7px 14px; border-radius:8px;
            font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; cursor:pointer; transition:.2s;
        }
        .rescan-btn:hover { background:rgba(255,255,255,0.22); }

        .app-body { max-width:500px; margin:0 auto; padding:20px 16px 40px; }

        /* ── DIGITAL CARD ── */
        .digital-card { background:var(--card); border-radius:18px; box-shadow:var(--shadow-lg); overflow:hidden; }

        .card-top {
            background:linear-gradient(135deg,var(--blue),var(--blue-mid));
            padding:22px 20px; text-align:center; position:relative;
        }
        .card-top::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:20px; background:var(--card); border-radius:20px 20px 0 0; }
        .card-avatar {
            width:68px; height:68px; background:rgba(255,255,255,0.15);
            border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
            margin-bottom:10px; border:3px solid rgba(255,255,255,0.3);
        }
        .card-avatar svg { width:34px; height:34px; stroke:#fff; fill:none; }
        .card-name  { font-family:'Oswald',sans-serif; font-size:24px; font-weight:700; color:#fff; letter-spacing:1px; line-height:1.1; }
        .card-role  { font-size:13px; color:rgba(255,255,255,0.75); margin-top:5px; font-weight:600; }
        .card-phone { font-size:13px; color:rgba(255,255,255,0.55); margin-top:3px; font-weight:500; }

        .card-body { padding:10px 20px 24px; }

        .sec-title {
            font-family:'Oswald',sans-serif; font-size:11px; font-weight:600;
            letter-spacing:1.5px; color:var(--text-light); text-transform:uppercase;
            margin:18px 0 10px; display:flex; align-items:center; gap:6px;
        }
        .sec-title:first-child { margin-top:2px; }
        .sec-title::after { content:''; flex:1; height:1px; background:var(--border); }

        .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .info-cell { background:#f8fafc; border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
        .info-key { font-family:'Oswald',sans-serif; font-size:9px; font-weight:600; letter-spacing:1px; color:var(--text-light); text-transform:uppercase; margin-bottom:3px; }
        .info-val { font-size:13px; font-weight:600; color:var(--text); line-height:1.3; }

        .qr-section { text-align:center; }
        .qr-divider { display:flex; align-items:center; gap:10px; margin:18px 0; }
        .qr-divider::before,.qr-divider::after { content:''; flex:1; height:2px; background:linear-gradient(to right,transparent,var(--green),transparent); }
        .qr-divider-text { font-family:'Oswald',sans-serif; font-size:12px; font-weight:600; letter-spacing:1.5px; color:var(--green); white-space:nowrap; }
        .qr-frame {
            display:inline-block; padding:16px; background:#fff;
            border:3px solid var(--green); border-radius:16px;
            box-shadow:0 6px 24px rgba(5,150,105,0.12); position:relative;
        }
        .qr-frame::before { content:''; position:absolute; inset:4px; border:1px dashed rgba(5,150,105,0.2); border-radius:12px; pointer-events:none; }
        .qr-code-id { margin-top:14px; font-family:'Oswald',sans-serif; font-size:22px; font-weight:700; color:var(--blue); letter-spacing:3px; word-break:break-all; }
        .qr-label   { font-size:10px; color:var(--text-light); letter-spacing:.5px; margin-top:4px; font-weight:500; }

        /* NOTIF */
        .notif { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-100px); padding:12px 24px; border-radius:12px; font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:.5px; box-shadow:0 8px 24px rgba(0,0,0,.2); z-index:9999; transition:transform .3s; white-space:nowrap; }
        .notif.show { transform:translateX(-50%) translateY(0); }
        .notif.success { background:var(--green); color:#fff; }
        .notif.error   { background:var(--red);   color:#fff; }

        @media print {
            .app-header { display:none !important; }
            .app-body { padding:0; }
            .digital-card { box-shadow:none; border:2px solid #000; }
        }
        @media (max-width:400px) {
            .scan-card { padding:28px 18px; }
            .info-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<!-- ── SCAN SCREEN ── -->
<div class="scan-screen" id="scanScreen">
    <div class="scan-card">
        <div class="scan-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="4" height="4"/><line x1="22" y1="14" x2="22" y2="22"/><line x1="14" y1="22" x2="22" y2="22"/></svg>
            </div>
            <h1>DIGITAL CARD</h1>
            <p>SBD 2026 · ICF-SL / NMCP</p>
        </div>

        <div class="err-box" id="errBox"></div>

        <p class="scan-hint">Point your camera at the <strong>SBD ID card QR code</strong> to load your digital card.</p>

        <div class="reader-wrap" id="readerWrap">
            <div id="reader-login"></div>
        </div>

        <button class="scan-btn btn-start" id="btnStart" onclick="startScan()">
            <svg viewBox="0 0 24 24" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
            START SCANNER
        </button>
        <button class="scan-btn btn-stop" id="btnStop" style="display:none;" onclick="stopScan()">STOP SCANNER</button>
    </div>
</div>

<!-- ── APP SCREEN ── -->
<div class="app-screen" id="appScreen">
    <div class="app-header">
        <div class="hdr-row">
            <div class="hdr-left">
                <div class="hdr-icon">
                    <svg viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="4" height="4"/><line x1="22" y1="14" x2="22" y2="22"/><line x1="14" y1="22" x2="22" y2="22"/></svg>
                </div>
                <div>
                    <div class="hdr-title">DIGITAL CARD</div>
                    <div class="hdr-sub" id="hdrSub">SBD 2026</div>
                </div>
            </div>
            <button class="rescan-btn" onclick="doRescan()">🔄 SCAN AGAIN</button>
        </div>
    </div>
    <div class="app-body">
        <div class="digital-card">
            <div class="card-top">
                <div class="card-avatar">
                    <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div class="card-name"  id="cardName">—</div>
                <div class="card-role"  id="cardRole"></div>
                <div class="card-phone" id="cardPhone"></div>
            </div>
            <div class="card-body" id="cardBody"></div>
        </div>
    </div>
</div>

<div class="notif" id="notif"></div>

<script>
var scanner = null;

/* ── SCANNER ── */
function startScan() {
    document.getElementById('readerWrap').style.display = 'block';
    document.getElementById('btnStart').style.display   = 'none';
    document.getElementById('btnStop').style.display    = 'flex';
    document.getElementById('errBox').classList.remove('show');

    scanner = new Html5Qrcode('reader-login');
    scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 220, height: 220 }, aspectRatio: 1 },
        function(decoded) {
            scanner.stop().then(function() {
                scanner = null;
                resetScanUI();
                handleQR(decoded);
            });
        },
        function() {}
    ).catch(function() {
        resetScanUI();
        showErr('Camera access denied. Please allow camera permission and try again.');
    });
}

function stopScan() {
    if (scanner) { scanner.stop().catch(function(){}); scanner = null; }
    resetScanUI();
}

function resetScanUI() {
    document.getElementById('readerWrap').style.display = 'none';
    document.getElementById('btnStart').style.display   = 'flex';
    document.getElementById('btnStop').style.display    = 'none';
}

/* ── PARSE QR ── */
function parseQR(text) {
    var r = { code:'', name:'', tel:'', role:'', district:'', chiefdom:'', section:'', facility:'', community:'', school:'', _format:'' };

    // SBD plain-text format
    if (text.indexOf('Name:') !== -1 || text.indexOf('ID:') !== -1) {
        text.split('\n').forEach(function(line) {
            var sep = line.indexOf(':');
            if (sep === -1) return;
            var key = line.substring(0, sep).trim().toLowerCase();
            var val = line.substring(sep + 1).trim();
            if (key === 'name')     r.name     = val;
            if (key === 'id')       r.code     = val;
            if (key === 'role')     r.role     = val;
            if (key === 'district') r.district = val;
            if (key === 'tel')      r.tel      = val;
        });
        if (!r.code && r.tel) r.code = 'SBD-' + r.tel;
        r._format = 'sbd';
        return r;
    }

    // JSON format (Digital Card)
    try {
        var obj = JSON.parse(text);
        r._format  = 'json';
        r.code     = obj.code     || obj.id       || obj.ID   || '';
        r.name     = obj.name     || obj.Name     || obj.fullName || '';
        r.tel      = obj.phone    || obj.tel      || obj.telephone || '';
        r.role     = obj.role     || obj.Role     || '';
        r.district = obj.district || obj.District || obj.adm1 || '';
        r.chiefdom = obj.chiefdom || obj.Chiefdom || obj.adm2 || '';
        r.section  = obj.section  || obj.Section  || obj.adm3 || '';
        r.facility = obj.facility || obj.Facility || obj.hf   || '';
        r.community= obj.community|| obj.Community|| '';
        r.school   = obj.school   || obj.School   || obj.school_name || '';
        return r;
    } catch(e) {}

    r._format = 'unknown';
    return r;
}

/* ── VALIDATE ── */
function validateQR(d) {
    if (d._format === 'unknown') {
        return 'Unrecognised QR code. Please scan a valid SBD ID card.';
    }
    var missing = [];
    if (!d.name)     missing.push('Name');
    if (!d.code)     missing.push('ID');
    if (!d.role)     missing.push('Role');
    if (!d.district) missing.push('District');
    if (!d.tel)      missing.push('Telephone');
    if (missing.length) {
        return 'Invalid QR — missing required field' + (missing.length > 1 ? 's' : '') + ': ' + missing.join(', ') + '.';
    }
    return null;
}

/* ── HANDLE QR ── */
function handleQR(text) {
    var data  = parseQR(text);
    var error = validateQR(data);
    if (error) { showErr(error); return; }
    loadCard(data);
}

/* ── LOAD CARD ── */
function loadCard(d) {
    document.getElementById('scanScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('show');
    document.getElementById('hdrSub').textContent = d.code;

    document.getElementById('cardName').textContent  = d.name;
    document.getElementById('cardRole').textContent  = d.role;
    document.getElementById('cardPhone').textContent = '📞 ' + d.tel;

    var body = document.getElementById('cardBody');
    body.innerHTML = '';

    // helper — skip cell if no value
    function cell(key, val) {
        if (!val || !val.trim()) return '';
        return '<div class="info-cell">' +
            '<div class="info-key">' + key + '</div>' +
            '<div class="info-val">' + val + '</div>' +
        '</div>';
    }

    // ── Identity (always present — validated above)
    var idCells = cell('ID Number', d.code) + cell('District', d.district);
    body.innerHTML += '<div class="sec-title">Identity</div><div class="info-grid">' + idCells + '</div>';

    // ── Location extras — only if present in QR
    var locCells =
        cell('Chiefdom',        d.chiefdom)  +
        cell('Section',         d.section)   +
        cell('Health Facility', d.facility)  +
        cell('Community',       d.community) +
        cell('School',          d.school);

    if (locCells) {
        body.innerHTML += '<div class="sec-title">Location</div><div class="info-grid">' + locCells + '</div>';
    }

    // ── QR Code
    var qrPayload = JSON.stringify({
        code: d.code, name: d.name, phone: d.tel,
        role: d.role, district: d.district,
        chiefdom: d.chiefdom, section: d.section,
        facility: d.facility, community: d.community, school: d.school
    });

    body.innerHTML +=
        '<div class="qr-section">' +
            '<div class="qr-divider"><span class="qr-divider-text">VERIFICATION QR</span></div>' +
            '<div class="qr-frame"><div id="qrEl"></div></div>' +
            '<div class="qr-code-id">' + d.code + '</div>' +
            '<div class="qr-label">Scan to verify identity</div>' +
        '</div>';

    setTimeout(function() {
        var el = document.getElementById('qrEl');
        if (!el) return;
        try {
            new QRCode(el, {
                text: qrPayload, width: 200, height: 200,
                colorDark: '#0a2463', colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });
        } catch(e) {
            el.innerHTML = '<p style="color:#94a3b8;font-size:12px;padding:20px;">QR generation error</p>';
        }
    }, 80);

    showNotif('Card loaded — ' + d.name, 'success');
}

/* ── RESCAN ── */
function doRescan() {
    document.getElementById('appScreen').classList.remove('show');
    document.getElementById('scanScreen').style.display = '';
    document.getElementById('errBox').classList.remove('show');
    var el = document.getElementById('qrEl');
    if (el) el.innerHTML = '';
}

/* ── HELPERS ── */
function showErr(msg) {
    var el = document.getElementById('errBox');
    el.textContent = msg;
    el.classList.remove('show');
    void el.offsetWidth; // force reflow for re-animation
    el.classList.add('show');
    showNotif('Invalid QR code', 'error');
}
function showNotif(msg, type) {
    var el = document.getElementById('notif');
    el.textContent = msg; el.className = 'notif show ' + (type||'success');
    clearTimeout(el._t);
    el._t = setTimeout(function(){ el.className = 'notif'; }, 2800);
}
</script>
</body>
</html>
